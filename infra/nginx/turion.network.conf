# ============================================================
# TURION NETWORK — Nginx Config
# Arquivo: /etc/nginx/sites-available/turion.network
# ============================================================

# Redireciona HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name turion.network www.turion.network;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turion.network www.turion.network;

    # SSL — gerado pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/turion.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turion.network/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Seguranca
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Logs
    access_log /var/log/nginx/turion.access.log;
    error_log  /var/log/nginx/turion.error.log;

    # Tamanho maximo de upload
    client_max_body_size 50M;

    # Proxy para Next.js (porta 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # Proxy para FastAPI (porta 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Assets estaticos Next.js — cache longo
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }
}
